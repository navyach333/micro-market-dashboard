<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Micro-Market Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* base font setting */
      body {
        font-family: "Inter", sans-serif;
      }
      /* Micro-interaction: Subtle shrink effect when buttons are clicked */
      button:active {
        transform: scale(0.95);
      }
      /* The base card style */
      .vendor-card {
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease; /* Makes the move smooth */
        cursor: pointer;
      }
      /* What happens when you hover */
      .vendor-card:hover {
        transform: translateY(-5px); /* Lifts the card up slightly */
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15); /* Adds a deeper shadow */
      }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen pb-20">
    <header class="bg-white border-b border-slate-200 py-6 mb-8">
      <div class="max-w-7xl mx-auto px-4">
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
          Micro-Market<span class="text-blue-600">.</span>
        </h1>
        <p class="text-slate-500 font-medium">
          Connecting small vendors with wholesale markets.
        </p>
      </div>
    </header>
    <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row gap-8">
      <aside class="w-full md:w-80 flex-shrink-0">
        <div class="grid grid-cols-2 gap-4 mb-6">
          <div
            class="bg-blue-50 p-4 rounded-2xl border border-blue-100 shadow-sm"
          >
            <p
              class="text-[10px] font-black uppercase tracking-widest text-blue-400 mb-1"
            >
              Total
            </p>
            <h4
              id="total-count"
              class="text-2xl font-bold text-blue-700 leading-none"
            >
              0
            </h4>
          </div>
          <div
            class="bg-amber-50 p-4 rounded-2xl border border-amber-100 shadow-sm"
          >
            <p
              class="text-[10px] font-black uppercase tracking-widest text-amber-400 mb-1"
            >
              Avg. Star
            </p>
            <h4
              id="avg-rating"
              class="text-2xl font-bold text-amber-700 leading-none"
            >
              0.0
            </h4>
          </div>
        </div>

        <div
          class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm sticky top-8"
        >
          <h3 class="text-xl font-bold text-slate-900 mb-1">
            Add New Supplier
          </h3>
          <p class="text-slate-500 text-sm mb-6">
            Expand your network directory.
          </p>

          <div class="space-y-4">
            <div>
              <label class="text-[10px] font-bold uppercase text-slate-400 ml-1"
                >Business Name</label
              >
              <input
                type="text"
                id="new-name"
                placeholder="e.g. Express Grain Mart"
                class="w-full mt-1 p-3 rounded-xl border border-slate-100 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
              />
            </div>
            <div>
              <label class="text-[10px] font-bold uppercase text-slate-400 ml-1"
                >Category</label
              >
              <input
                type="text"
                id="new-category"
                placeholder="e.g. Food & Grains"
                class="w-full mt-1 p-3 rounded-xl border border-slate-100 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
              />
            </div>
            <div>
              <label class="text-[10px] font-bold uppercase text-slate-400 ml-1"
                >Location</label
              >
              <input
                type="text"
                id="new-location"
                placeholder="e.g. Chandni Chowk"
                class="w-full mt-1 p-3 rounded-xl border border-slate-100 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
              />
            </div>
            <div>
              <label
                class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2 block"
                >Initial Rating</label
              >
              <input
                type="number"
                id="new-rating"
                step="0.1"
                max="5"
                min="1"
                placeholder="5.0"
                class="w-full p-4 bg-slate-50 border-none rounded-2xl mb-6"
              />
            </div>
            <button
              onclick="addNewSupplier()"
              class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-100"
            >
              Add to Directory
            </button>
          </div>
        </div>
      </aside>
      <main class="flex-grow">
        <div class="flex flex-col gap-6 mb-8">
          <div class="flex flex-col sm:flex-row gap-4 items-center">
            <div class="relative flex-grow w-full">
              <span
                class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                  />
                </svg>
              </span>
              <input
                type="text"
                id="search-bar"
                placeholder="Search by name or area..."
                class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm"
              />
            </div>

            <button
              id="sort-btn"
              class="w-full sm:w-auto px-6 py-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-700 hover:bg-slate-50 transition-colors shadow-sm flex items-center justify-center gap-2"
            >
              ⭐ <span class="whitespace-nowrap">Sort by Rating</span>
            </button>
          </div>

          <div
            id="category-filters"
            class="flex flex-wrap gap-2 items-center"
          ></div>
        </div>

        <div
          id="supplier-list"
          class="grid grid-cols-1 lg:grid-cols-2 gap-6"
        ></div>
      </main>
    </div>

    <script src="script.js"></script>

    <div
      id="toast"
      class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl transition-all opacity-0 pointer-events-none translate-y-10 z-50"
    >
      Action Successful!
    </div>
  </body>
</html>
